#
# File list for
#
#   drush checkstarterkit [--fixit]
#
#   Helper to keep base_theme and STARTERKIT files synced.
#
#   * In pipeline run `drush checkstarterkit` to fail on inconsistencies.
#   * Local you can copy files over with `drush checkstarterkit --fixit` after changes or updates.
#
# These files may be upgraded in the base theme.
syncFiles:
  - package.json
  - package-lock.json
  - config.js.example
  - favicon.ico
  - gulpfile.js
  - logo.svg
  - README.md
  - screenshot.png
  - color/color.inc
  - color/css_color_variables_dependants.yml
