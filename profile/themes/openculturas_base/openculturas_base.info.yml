name: OpenCulturas Base
type: theme
base theme: classy
description: "A base theme for the OpenCulturas distribution. BEWARE: Don't change files of this theme. If you want to add custom theme logic, please create a sub theme based on openculturas_base."
package: Custom
core_version_requirement: ^8 || ^9
libraries:
  - openculturas_base/global
regions:
  page_above: 'Above everything'
  branding: 'Branding (used for logo and slogan of the website)'
  utilities: 'Utilities (next to burger button)'
  burger_menu: 'Burger menu (only visible with opened burger menu)'
  highlights_menu: 'Highlights menu'
  header_intro: 'Header intro (for images, sliders, heroes)'
  pagetitle: 'Page title'
  content: 'Main content'
  footer: 'Footer'
  page_bottom: 'Below everything'
